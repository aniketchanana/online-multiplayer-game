<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <link rel="stylesheet" href="./tictactoe.css">
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.4.1/css/bootstrap.min.css" integrity="sha384-Vkoo8x4CGsO3+Hhxv8T/Q5PaXtkKtu6ug5TOeNV6gBiFeWPGFN9MuhOf23Q9Ifjh" crossorigin="anonymous">
    <title>TIC-TAC-TOE</title>
</head>
<body>
    <div class="container-fluid" id="gameboard">
        <div class="row center">
            <div class="col-lg-3 game__container" id="here">
                <div class="row game" id="game__board">
                    <span class="col-4 center cell" id="0-0" onclick="evthandler(event)"></span>
                    <span class="col-4 center cell" id="0-1" onclick="evthandler(event)"></span>
                    <span class="col-4 center cell" id="0-2" onclick="evthandler(event)"></span>
                    <span class="col-4 center cell" id="1-0" onclick="evthandler(event)"></span>
                    <span class="col-4 center cell" id="1-1" onclick="evthandler(event)"></span>
                    <span class="col-4 center cell" id="1-2" onclick="evthandler(event)"></span>
                    <span class="col-4 center cell" id="2-0" onclick="evthandler(event)"></span>
                    <span class="col-4 center cell" id="2-1" onclick="evthandler(event)"></span>
                    <span class="col-4 center cell" id="2-2" onclick="evthandler(event)"></span>
                </div>
            </div>
        </div>
        <div class="row">
            <div class="col-lg-6 col-sm-12 col-xs-12 messages__side">
                <div class="chat__box">
                    <div id="messages">
                    </div>
                    <div class="typemessage">
                        <form id="form">
                            <input type="text" id="text__message" required>
                            <button type="submit">Send</button>
                        </form>
                    </div>
                </div>
            </div>

            <div class="col-lg-6 col-sm-12 col-xs-12 game__status">
                <h1>Game status</h1>
                <p id="status">Loading...</p>
                <p id="players">
                    <span id="player1" class="active"></span>
                    <span>vs</span>
                    <span id="player2"></span>
                </p>
            </div>
        </div>
    </div>
    <div id="waiting">
        <h1 id="waiting__message"></h1>
    </div>
</body>
<script src="/socket.io/socket.io.js"></script>
<script src="https://code.jquery.com/jquery-3.4.1.slim.min.js" integrity="sha384-J6qa4849blE2+poT4WnyKhv5vZF5SrPo0iEjwBvKU7imGFAV0wwj1yYfoRSJoZ+n" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/popper.js@1.16.0/dist/umd/popper.min.js" integrity="sha384-Q6E9RHvbIyZFJoft+2mJbHaEWldlvI9IOYy5n3zV9zzTtmI3UksdQRVvoxMfooAo" crossorigin="anonymous"></script>
<script src="https://stackpath.bootstrapcdn.com/bootstrap/4.4.1/js/bootstrap.min.js" integrity="sha384-wfSDF2E50Y2D1uUdj0O3uMBJnjuUD4Ih7YwaYd1iqfktj0Uod8GCExl3Og8ifwB6" crossorigin="anonymous"></script>
<script src="./tictactoe.js"></script>
</html>
